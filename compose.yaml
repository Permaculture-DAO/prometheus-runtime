name: prometheus-v703-audit-convergence
services:
  db:
    image: postgres:16-alpine
    env_file: .env.local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [backend]

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file: .env.local
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - evidence_data:/data/evidence
      - ../01_CANON:/documents:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [backend]

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./services/gateway/static:/usr/share/nginx/html:ro
      - ../01_CANON:/documents:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [backend]

  holochain-conductor:
    profiles: ["holochain"]
    build:
      context: ./services/holochain
    env_file: .env.local
    volumes:
      - holochain_data:/var/lib/holochain
    restart: unless-stopped
    networks: [backend]

  holochain-bridge:
    profiles: ["holochain"]
    build:
      context: ./services/holochain_bridge
    env_file: .env.local
    depends_on:
      - holochain-conductor
    restart: unless-stopped
    networks: [backend]

volumes:
  postgres_data:
  evidence_data:
  holochain_data:

networks:
  backend:
    driver: bridge
